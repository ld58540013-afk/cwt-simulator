<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWT Interactive Simulator - Jack Liu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        #header {
            text-align: center;
            padding: 15px;
            background-color: #1e293b;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
        h1 { margin: 0; font-size: 24px; color: #38bdf8; }
        p.subtitle { margin: 5px 0 0 0; font-size: 14px; color: #94a3b8; }
        
        #controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px;
            width: 100%;
            background-color: #0f172a;
            flex-wrap: wrap;
        }
        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1e293b;
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid #334155;
        }
        input[type=range] { width: 300px; cursor: pointer; }
        
        #metrics {
            display: flex;
            gap: 20px;
            font-size: 16px;
            font-weight: bold;
        }
        .metric-box {
            background: #1e293b;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            text-align: center;
            min-width: 120px;
        }
        .highlight-red { color: #f87171; font-size: 18px; }
        .highlight-blue { color: #60a5fa; font-size: 18px; }

        .oracle-btn {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #0f172a;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }
        .oracle-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.6);
        }
        .oracle-btn:active {
            transform: translateY(1px);
        }

        #oracle-display {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid #818cf8;
            padding: 20px 30px;
            border-radius: 12px;
            max-width: 700px;
            width: 80%;
            text-align: center;
            backdrop-filter: blur(8px);
            display: none;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border-top: 3px solid #38bdf8;
        }
        #oracle-title {
            color: #38bdf8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        #oracle-text {
            color: #e2e8f0;
            font-size: 16px;
            line-height: 1.6;
            font-style: italic;
        }

        canvas {
            display: block;
            background-color: #020617;
            border-top: 1px solid #334155;
            flex-grow: 1;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>Consciousness Weaving Theory (CWT) Simulator</h1>
        <p class="subtitle">Operator Dynamics & Macroscopic Limit Violations</p>
    </div>

    <div id="controls">
        <div class="slider-container">
            <label for="lambdaSlider" style="font-size: 16px; margin-bottom: 10px;">
                Intention Intensity (λ): <span id="lambdaValue" style="color:#38bdf8; font-weight:bold; font-size:18px;">0.00</span>
            </label>
            <input type="range" id="lambdaSlider" min="0" max="1" step="0.01" value="0">
        </div>

        <div id="metrics">
            <div class="metric-box">
                LGI (K3)<br>
                <span id="k3Value" class="highlight-red">1.000</span>
                <div id="k3Status" style="font-size: 11px; font-weight: normal; margin-top:5px; color:#94a3b8;">Classical Realism</div>
            </div>
            <div class="metric-box">
                Variance (Δt²)<br>
                <span id="dtValue" class="highlight-blue">∞ (Chronostasis)</span>
                <div style="font-size: 11px; font-weight: normal; margin-top:5px; color:#94a3b8;">Temporal Jitter</div>
            </div>
        </div>

        <button onclick="askOracle()" class="oracle-btn">✨ 解析当前宇宙状态 (AI)</button>
    </div>

    <div id="oracle-display">
        <div id="oracle-title">Gemini AI Oracle Interpretation</div>
        <div id="oracle-text">正在链接高维拓扑流形，请稍候...</div>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const lambdaSlider = document.getElementById('lambdaSlider');
        const lambdaValueDisplay = document.getElementById('lambdaValue');
        const k3ValueDisplay = document.getElementById('k3Value');
        const k3StatusDisplay = document.getElementById('k3Status');
        const dtValueDisplay = document.getElementById('dtValue');

        // Resize canvas to fit remaining window space
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - document.getElementById('header').offsetHeight - document.getElementById('controls').offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Wave parameters for visual simulation
        const numWaves = 30;
        let waves = [];
        for (let i = 0; i < numWaves; i++) {
            waves.push({
                amplitude: 20 + Math.random() * 40,
                frequency: 0.01 + Math.random() * 0.03,
                phase: Math.random() * Math.PI * 2,
                yOffset: (Math.random() - 0.5) * 100,
                basePhaseSpeed: 0.02 + Math.random() * 0.05
            });
        }

        const F_Q = 1.5; // Quantum Fisher Information Constant

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let lambda = parseFloat(lambdaSlider.value);
            
            // --- Update UI Metrics ---
            lambdaValueDisplay.textContent = lambda.toFixed(2);
            
            // K3 calculation (Eq 6.1)
            let k3 = 1.0 + (lambda * F_Q);
            k3ValueDisplay.textContent = k3.toFixed(3);
            if (k3 > 1.0) {
                k3StatusDisplay.textContent = "Quantum Interference!";
                k3StatusDisplay.style.color = "#f87171";
            } else {
                k3StatusDisplay.textContent = "Classical Realism";
                k3StatusDisplay.style.color = "#94a3b8";
            }

            // Delta t^2 calculation (Eq 6.2)
            let dt2 = lambda === 0 ? Infinity : 1.0 / (lambda * F_Q);
            dtValueDisplay.textContent = lambda === 0 ? "∞ (Chronostasis)" : dt2.toFixed(3);

            // --- Draw Top Panel: The Weaving Process ---
            let topHeight = canvas.height * 0.6;
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, topHeight);
            
            // Draw Blueprint target line
            ctx.beginPath();
            ctx.moveTo(0, topHeight / 2);
            ctx.lineTo(canvas.width, topHeight / 2);
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            ctx.fillStyle = 'rgba(56, 189, 248, 0.5)';
            ctx.font = '14px sans-serif';
            ctx.fillText('Target Informational Blueprint (I)', 20, topHeight / 2 - 10);

            // Animate and draw waves
            for (let i = 0; i < waves.length; i++) {
                let w = waves[i];
                
                // CWT Non-linear Operator effect
                w.phase += w.basePhaseSpeed;
                
                // Weaving collapse effect
                let currentAmp = w.amplitude * (1 - lambda * 0.8);
                let currentYOffset = w.yOffset * (1 - lambda);

                ctx.beginPath();
                for (let x = 0; x < canvas.width; x += 5) {
                    let y = topHeight / 2 + currentYOffset + Math.sin(x * w.frequency + w.phase) * currentAmp;
                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                
                // Color shifts from chaotic grey to focused bright blue based on lambda
                let r = Math.floor(100 - lambda * 100);
                let g = Math.floor(100 + lambda * 100);
                let b = Math.floor(100 + lambda * 155);
                let alpha = 0.2 + lambda * 0.5;
                ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                ctx.lineWidth = 1 + lambda * 1.5;
                ctx.stroke();
            }

            // --- Draw Bottom Panel: Dynamic Graphs ---
            let bottomHeight = canvas.height - topHeight;
            let startY = topHeight;
            
            // Draw axes for K3 and dt^2
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(50, startY + 20);
            ctx.lineTo(50, canvas.height - 20);
            ctx.lineTo(canvas.width - 20, canvas.height - 20);
            ctx.stroke();

            // Plot K3 line (Red)
            ctx.beginPath();
            ctx.strokeStyle = '#f87171';
            ctx.lineWidth = 3;
            for (let x = 0; x <= canvas.width - 70; x += 2) {
                let simLambda = x / (canvas.width - 70);
                let simK3 = 1.0 + (simLambda * F_Q);
                let y = canvas.height - 20 - ((simK3 - 0.5) / 2.5) * (bottomHeight - 40);
                if (x === 0) ctx.moveTo(50 + x, y);
                else ctx.lineTo(50 + x, y);
            }
            ctx.stroke();

            // Plot Delta t^2 curve (Blue)
            ctx.beginPath();
            ctx.strokeStyle = '#60a5fa';
            ctx.lineWidth = 3;
            for (let x = 1; x <= canvas.width - 70; x += 2) {
                let simLambda = x / (canvas.width - 70);
                let simDt2 = 1.0 / (simLambda * F_Q + 0.05);
                let y = canvas.height - 20 - (simDt2 / 20) * (bottomHeight - 40);
                if (y < startY + 20) y = startY + 20;
                
                if (x === 1) ctx.moveTo(50 + x, y);
                else ctx.lineTo(50 + x, y);
            }
            ctx.stroke();

            // Draw current lambda indicator
            let indicatorX = 50 + lambda * (canvas.width - 70);
            ctx.beginPath();
            ctx.moveTo(indicatorX, startY + 20);
            ctx.lineTo(indicatorX, canvas.height - 20);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]);

            // Labels
            ctx.fillStyle = '#f87171';
            ctx.fillText('LGI K3 (Realism Violation)', canvas.width - 200, startY + 40);
            ctx.fillStyle = '#60a5fa';
            ctx.fillText('Δt² (Time Variance)', canvas.width - 200, startY + 60);

            requestAnimationFrame(draw);
        }

        draw();

        // --- Gemini AI Integration ---
        async function askOracle() {
            const display = document.getElementById('oracle-display');
            const textElement = document.getElementById('oracle-text');
            display.style.display = 'block';
            textElement.innerHTML = "正在链接高维拓扑流形，请求宇宙法则的启示，请稍候...";

            const lambda = lambdaSlider.value;
            const k3 = (1.0 + (lambda * 1.5)).toFixed(3);
            const dt2 = lambda == 0 ? "Infinity" : (1.0 / (lambda * 1.5)).toFixed(3);
            
            const prompt = `你现在是一个基于“意识编织理论(CWT)”的物理学高维神谕。用户在模拟器中将“意图强度 λ”调到了 ${lambda}。此时物理系统中，宏观实在论参数 K3=${k3}，时间方差 Δt²=${dt2}。请用极具科幻感、物理学深度且充满哲学意味的语言（100字以内，中文），解释当前这个 λ 值下，时空拓扑和量子坍缩的状态是怎样的。`;
            
            const apiKey = ""; // API key is injected at runtime
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };

            let retries = 0;
            const delays = [1000, 2000, 4000, 8000, 16000];

            while (retries < 6) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error("API Error");
                    
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        textElement.innerHTML = text;
                        return;
                    } else {
                        throw new Error("Invalid response format");
                    }
                } catch (error) {
                    if (retries < 5) {
                        await new Promise(res => setTimeout(res, delays[retries]));
                        retries++;
                    } else {
                        textElement.innerHTML = "神谕连接失败：该状态的算力需求超越了当前普朗克尺度的极限。请稍后再试。";
                        return;
                    }
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWT Interactive Simulator - Jack Liu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        #header {
            text-align: center;
            padding: 12px;
            background-color: #1e293b;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }
        h1 { margin: 0; font-size: 22px; color: #38bdf8; }
        p.subtitle { margin: 4px 0 0 0; font-size: 13px; color: #94a3b8; }
        
        #controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 15px;
            width: 100%;
            background-color: #0f172a;
        }
        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1e293b;
            padding: 10px 30px;
            border-radius: 12px;
            border: 1px solid #334155;
            width: 320px;
        }
        input[type=range] { width: 100%; cursor: pointer; margin-top: 8px; }
        
        #metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 1200px;
        }
        .metric-box {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            text-align: center;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .metric-title { font-size: 12px; color: #cbd5e1; margin-bottom: 5px; }
        .metric-value { font-size: 18px; font-weight: bold; }
        .metric-status { font-size: 11px; margin-top: 5px; }
        
        /* 颜色定义 */
        .c-red { color: #f87171; }
        .c-blue { color: #60a5fa; }
        .c-yellow { color: #fbbf24; }
        .c-purple { color: #c084fc; }

        canvas {
            display: block;
            background-color: #020617;
            border-top: 1px solid #334155;
            flex-grow: 1;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>Consciousness Weaving Theory (CWT) Simulator : Ultimate</h1>
        <p class="subtitle">Complete 4-Parameter Dynamics & Macroscopic Limit Violations</p>
    </div>

    <div id="controls">
        <div class="slider-container">
            <label for="lambdaSlider" style="font-size: 15px;">
                Intention Intensity (λ): <span id="lambdaValue" style="color:#38bdf8; font-weight:bold; font-size:18px;">0.00</span>
            </label>
            <input type="range" id="lambdaSlider" min="0" max="1" step="0.01" value="0">
        </div>

        <div id="metrics-grid">
            <div class="metric-box">
                <div class="metric-title">1. LGI Violation (K3)</div>
                <div id="k3Value" class="metric-value c-red">1.000</div>
                <div id="k3Status" class="metric-status" style="color:#94a3b8;">Classical Realism</div>
            </div>
            <div class="metric-box">
                <div class="metric-title">2. Time Variance (Δt²)</div>
                <div id="dtValue" class="metric-value c-blue">∞</div>
                <div id="dtStatus" class="metric-status" style="color:#94a3b8;">Chronostasis</div>
            </div>
            <div class="metric-box">
                <div class="metric-title">3. Jarzynski Work (ΔW)</div>
                <div id="dwValue" class="metric-value c-yellow">0.000 J</div>
                <div id="dwStatus" class="metric-status" style="color:#94a3b8;">Thermodynamic Eq.</div>
            </div>
            <div class="metric-box">
                <div class="metric-title">4. Entanglement (E_N)</div>
                <div id="enValue" class="metric-value c-purple">0.000</div>
                <div id="enStatus" class="metric-status" style="color:#94a3b8;">Separable State</div>
            </div>
        </div>
    </div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const lambdaSlider = document.getElementById('lambdaSlider');
        
        // Metrics DOM
        const valL = document.getElementById('lambdaValue');
        const vK3 = document.getElementById('k3Value'), sK3 = document.getElementById('k3Status');
        const vDt = document.getElementById('dtValue'), sDt = document.getElementById('dtStatus');
        const vDw = document.getElementById('dwValue'), sDw = document.getElementById('dwStatus');
        const vEn = document.getElementById('enValue'), sEn = document.getElementById('enStatus');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - document.getElementById('header').offsetHeight - document.getElementById('controls').offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 物理常数 (用于视觉模拟)
        const F_Q = 1.5; 
        const W_scale = 4.2;
        const En_scale = 3.5;

        // 初始化两组独立的波函数 (System A & System B)
        const numWavesPerSystem = 12;
        let sysA = [], sysB = [];
        
        for (let i = 0; i < numWavesPerSystem; i++) {
            sysA.push({
                amp: 15 + Math.random() * 30,
                freq: 0.01 + Math.random() * 0.02,
                phase: Math.random() * Math.PI * 2,
                yOff: -50 - Math.random() * 40, // A在上方
                speed: 0.02 + Math.random() * 0.04
            });
            sysB.push({
                amp: 15 + Math.random() * 30,
                freq: 0.01 + Math.random() * 0.02,
                phase: Math.random() * Math.PI * 2,
                yOff: 50 + Math.random() * 40, // B在下方
                speed: 0.02 + Math.random() * 0.04
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let lambda = parseFloat(lambdaSlider.value);
            valL.textContent = lambda.toFixed(2);
            
            // ==========================================
            // 1. 数据逻辑与 DOM 更新
            // ==========================================
            
            // K3
            let k3 = 1.0 + (lambda * F_Q);
            vK3.textContent = k3.toFixed(3);
            if(k3 > 1.0) { sK3.textContent = "Quantum Interference!"; sK3.style.color = "#f87171"; } 
            else { sK3.textContent = "Classical Realism"; sK3.style.color = "#94a3b8"; }

            // dt^2
            let dt2 = lambda === 0 ? Infinity : 1.0 / (lambda * F_Q);
            vDt.textContent = lambda === 0 ? "∞" : dt2.toFixed(3);
            if(lambda > 0.1) { sDt.textContent = "Metric Time Flow"; sDt.style.color = "#60a5fa"; }
            else { sDt.textContent = "Chronostasis (Jitter)"; sDt.style.color = "#94a3b8"; }

            // Delta W (Jarzynski)
            let dw = lambda * W_scale;
            vDw.textContent = dw.toFixed(3) + " J";
            if(dw > 0) { sDw.textContent = "Informational Work Done"; sDw.style.color = "#fbbf24"; }
            else { sDw.textContent = "Thermodynamic Eq."; sDw.style.color = "#94a3b8"; }

            // Entanglement E_N (Logarithmic Negativity)
            let en = Math.pow(lambda, 2) * En_scale; // 非线性增长
            vEn.textContent = en.toFixed(3);
            if(en > 0.1) { sEn.textContent = "Macroscopic Entanglement"; sEn.style.color = "#c084fc"; }
            else { sEn.textContent = "Separable State"; sEn.style.color = "#94a3b8"; }


            // ==========================================
            // 2. 绘制上半区：波函数与纠缠模拟
            // ==========================================
            let topH = canvas.height * 0.55;
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, topH);
            
            // Blueprint Line
            ctx.beginPath();
            ctx.moveTo(0, topH/2); ctx.lineTo(canvas.width, topH/2);
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.4)';
            ctx.lineWidth = 1; ctx.setLineDash([5, 5]); ctx.stroke(); ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(56, 189, 248, 0.6)'; ctx.font = '12px sans-serif';
            ctx.fillText('Universal Blueprint (I)', 10, topH/2 - 8);

            // 绘制波并收集路径点用于绘制纠缠
            let pointsA = [], pointsB = [];
            let step = 15; // 采样步长

            // 处理 System A & B
            [sysA, sysB].forEach((sys, sysIdx) => {
                for(let i=0; i<sys.length; i++) {
                    let w = sys[i];
                    w.phase += w.speed;
                    
                    // 坍缩逻辑：随着 lambda 增大，振幅减小，偏移量归零
                    let cAmp = w.amp * (1 - lambda * 0.85);
                    let cYOff = w.yOff * (1 - lambda);
                    
                    ctx.beginPath();
                    let currentPath = [];
                    for(let x=0; x<=canvas.width; x+=step) {
                        let y = topH/2 + cYOff + Math.sin(x*w.freq + w.phase)*cAmp;
                        if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                        if(x % 60 === 0) currentPath.push({x, y}); // 采样点
                    }
                    
                    // 颜色根据不同系统区分，且随 lambda 发亮
                    let r,g,b;
                    if(sysIdx === 0) { r = 100-lambda*50; g = 100+lambda*100; b = 250; } // 偏蓝
                    else { r = 250; g = 100+lambda*50; b = 100-lambda*50; } // 偏红
                    
                    ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${0.15 + lambda*0.4})`;
                    ctx.lineWidth = 1 + lambda;
                    ctx.stroke();

                    // 保存中心路径点用于后续连线
                    if(i === 0) {
                        if(sysIdx === 0) pointsA = currentPath;
                        else pointsB = currentPath;
                    }
                }
            });

            // 绘制系统A与B之间的“纠缠键” (Macroscopic Logarithmic Negativity)
            if(lambda > 0) {
                ctx.globalCompositeOperation = 'screen';
                ctx.beginPath();
                for(let i=0; i<pointsA.length; i++) {
                    ctx.moveTo(pointsA[i].x, pointsA[i].y);
                    ctx.lineTo(pointsB[i].x, pointsB[i].y);
                }
                // 纠缠线亮度随 lambda 平方增长
                let entAlpha = Math.pow(lambda, 1.5) * 0.8;
                ctx.strokeStyle = `rgba(192, 132, 252, ${entAlpha})`; // Purple glow
                ctx.lineWidth = 1 + lambda*2;
                ctx.stroke();
                ctx.globalCompositeOperation = 'source-over';
                
                if(lambda > 0.3) {
                    ctx.fillStyle = `rgba(192, 132, 252, ${entAlpha})`;
                    ctx.fillText('Entanglement Generation (E_N > 0)', canvas.width/2 - 80, topH/2 + 20);
                }
            }

            // ==========================================
            // 3. 绘制下半区：四项指标动态图表
            // ==========================================
            let botH = canvas.height - topH;
            let sy = topH;
            let midX = canvas.width / 2;

            // 背景与坐标轴
            ctx.fillStyle = '#020617'; ctx.fillRect(0, sy, canvas.width, botH);
            ctx.strokeStyle = '#334155'; ctx.lineWidth = 1;
            
            // 中间分割线
            ctx.beginPath(); ctx.moveTo(midX, sy+10); ctx.lineTo(midX, canvas.height-10); ctx.stroke();
            
            // 底部 X 轴
            let pad = 40;
            let gH = botH - 40;
            let gY = canvas.height - 20;
            ctx.beginPath();
            ctx.moveTo(pad, gY); ctx.lineTo(midX - pad, gY); // 左X轴
            ctx.moveTo(midX + pad, gY); ctx.lineTo(canvas.width - pad, gY); // 右X轴
            ctx.stroke();

            // 映射函数 (x为模拟的lambda 0~1)
            function getPlotY(val, minV, maxV) {
                let clamped = Math.max(minV, Math.min(val, maxV));
                let pct = (clamped - minV) / (maxV - minV);
                return gY - (pct * gH);
            }

            // --- 绘制左侧图表 (LGI K3 & Time dt^2) ---
            ctx.beginPath(); ctx.strokeStyle = '#f87171'; ctx.lineWidth=2; // Red K3
            for(let p=0; p<=1; p+=0.02) {
                let x = pad + p * (midX - 2*pad);
                let y = getPlotY(1.0 + p*F_Q, 0.5, 3.0);
                if(p===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            } ctx.stroke();

            ctx.beginPath(); ctx.strokeStyle = '#60a5fa'; ctx.lineWidth=2; // Blue dt2
            for(let p=0.01; p<=1; p+=0.02) {
                let x = pad + p * (midX - 2*pad);
                let y = getPlotY(1.0 / (p*F_Q), 0, 10);
                if(p===0.01) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            } ctx.stroke();

            // 左侧滑块指示器
            let indX1 = pad + lambda * (midX - 2*pad);
            ctx.beginPath(); ctx.moveTo(indX1, sy+20); ctx.lineTo(indX1, gY);
            ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);

            // --- 绘制右侧图表 (Jarzynski dW & Entanglement En) ---
            ctx.beginPath(); ctx.strokeStyle = '#fbbf24'; ctx.lineWidth=2; // Yellow dW
            for(let p=0; p<=1; p+=0.02) {
                let x = midX + pad + p * (canvas.width/2 - 2*pad);
                let y = getPlotY(p * W_scale, 0, 5);
                if(p===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            } ctx.stroke();

            ctx.beginPath(); ctx.strokeStyle = '#c084fc'; ctx.lineWidth=2; // Purple En
            for(let p=0; p<=1; p+=0.02) {
                let x = midX + pad + p * (canvas.width/2 - 2*pad);
                let y = getPlotY(Math.pow(p, 2) * En_scale, 0, 4);
                if(p===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            } ctx.stroke();

            // 右侧滑块指示器
            let indX2 = midX + pad + lambda * (canvas.width/2 - 2*pad);
            ctx.beginPath(); ctx.moveTo(indX2, sy+20); ctx.lineTo(indX2, gY);
            ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);

            // 图例标签
            ctx.font = '11px sans-serif';
            ctx.fillStyle = '#f87171'; ctx.fillText('K3 (Realism)', pad+10, sy+20);
            ctx.fillStyle = '#60a5fa'; ctx.fillText('Δt² (Time)', pad+10, sy+35);
            ctx.fillStyle = '#fbbf24'; ctx.fillText('ΔW (Work)', midX+pad+10, sy+20);
            ctx.fillStyle = '#c084fc'; ctx.fillText('E_N (Entanglement)', midX+pad+10, sy+35);

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
